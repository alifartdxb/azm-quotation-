<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 110" width="100%" height="100%">
  <!-- Outer Hexagon -->
  <polygon points="60,3 112,33 112,93 60,107 8,93 8,33" fill="none" stroke="#0f4472" stroke-width="2.5" />
  <!-- Inner Hexagon container -->
  <polygon points="60,7 108,35 108,91 60,103 12,91 12,35" fill="#ffffff" />
  
  <!-- Stylized 'AZM' Letters -->
  <!-- 'Z' in Dark Blue (forms the bottom base and main central diagonal) -->
  <path d="M 30,90 L 90,90 L 78,101 L 42,101 Z" fill="#0f4472" />
  <path d="M 32,90 L 88,24 L 72,24 L 16,90 Z" fill="#0f4472" />
  
  <!-- 'A' in Teal (on the left) -->
  <path d="M 22,82 L 48,24 L 58,24 L 32,82 Z" fill="#12a1b5" />
  <!-- Horizontal crossbar for A -->
  <path d="M 27,62 L 45,62 L 42,69 L 24,69 Z" fill="#12a1b5" />
  
  <!-- 'M' in Teal (on the right) -->
  <path d="M 62,82 L 88,24 L 98,24 L 72,82 Z" fill="#12a1b5" />
  <!-- Inner diagonal/vertical for M -->
  <path d="M 67,52 L 77,52 L 85,70 L 75,70 Z" fill="#12a1b5" />
</svg>
